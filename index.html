<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Edo & Alja</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Outfit:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --creme: #F3E7D8;
      --roze:  #EEB9B8;
      --groen: #172E23;
    }

    html, body { height: 100%; overflow: hidden; }

    body { font-family: 'Outfit', sans-serif; font-weight: 300; }

    .hero {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      position: relative;
      background:
        linear-gradient(180deg,
          rgba(21,37,57,.55) 0%,
          rgba(21,37,57,.25) 45%,
          rgba(21,37,57,.7)  100%),
        url('./foto.jpg') center center / cover no-repeat;
      background-color: var(--groen);
    }

    .hero-inner { position: relative; z-index: 1; max-width: 800px; }

    .hero-tag {
      font-size: .62rem;
      letter-spacing: .5em;
      text-transform: uppercase;
      color: var(--roze);
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp .8s ease forwards .3s;
    }

    .hero-names {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-style: italic;
      font-size: clamp(4.5rem, 16vw, 12rem);
      line-height: .88;
      color: var(--creme);
      opacity: 0;
      animation: fadeUp 1s ease forwards .5s;
    }

    .hero-names .amp {
      display: block;
      font-size: .22em;
      font-style: normal;
      color: var(--roze);
      letter-spacing: .15em;
      margin: .4em 0 .2em;
    }

    .hero-names .name-alja { color: var(--roze); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: none; }
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="hero-inner">
      <p class="hero-tag">Wij gaan trouwen</p>
      <div class="hero-names">
        <span>Edo</span>
        <span class="amp">&amp;</span>
        <span class="name-alja">Alja</span>
      </div>
    </div>
  </div>
</body>
</html>
